<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task.Flow Pro | Static Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <style>
        :root {
            --bg: #0d0b14; --card: rgba(30, 25, 45, 0.85); --accent: #d4af37;
            --text: #f8f1ff; --subtext: #b1a7c1; --border: rgba(212, 175, 55, 0.4);
            --danger: #ff4d4d;
        }

        [data-theme="light"] {
            --bg: #faf9fb; --card: rgba(255, 255, 255, 0.9); --accent: #e91e63;
            --text: #2d3436; --subtext: #636e72; --border: rgba(233, 30, 99, 0.2);
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; min-height: 100vh;
            display: flex; justify-content: center; transition: 0.5s; overflow-x: hidden;
        }

        .app-container { width: 100%; max-width: 1100px; padding: 20px; box-sizing: border-box; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .mode-toggle {
            padding: 10px 15px; border-radius: 50px; border: 1px solid var(--border);
            background: var(--card); color: var(--text); cursor: pointer; font-size: 12px;
        }

        /* --- Responsive Input Box --- */
        .input-box {
            background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid var(--border);
            display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 15px; margin-bottom: 40px;
            backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .input-wrapper { display: flex; flex-direction: column; gap: 5px; }
        .input-wrapper label { font-size: 0.7rem; color: var(--accent); font-weight: 900; text-transform: uppercase; }

        input, select {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 12px; border-radius: 12px; color: var(--text); outline: none;
        }
        select option { background: #1a1625; color: white; }

        .full-width { grid-column: span 4; }

        .add-btn {
            background: linear-gradient(135deg, var(--accent), #f2d06b);
            color: #1a1625; border: none; padding: 15px; border-radius: 15px;
            font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        /* --- Task Cards --- */
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        .task-card {
            background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid var(--border);
            position: relative; overflow: hidden;
        }

        .priority-badge { position: absolute; top: 15px; right: 15px; padding: 4px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; }
        .p-high { background: var(--danger); }
        .p-med { background: #ff9800; }
        .p-low { background: #4caf50; }

        .category-tag { font-size: 0.75rem; color: var(--accent); font-weight: 800; }
        .task-card h3 { margin: 10px 0; color: var(--accent); font-size: 1.5rem; }

        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .card-btn { flex: 1; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.8rem; }
        .edit-btn { background: transparent; border: 1px solid var(--subtext); color: var(--subtext); }
        .done-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .done-btn:hover { background: var(--accent); color: #000; }

        /* --- Modal & FX --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .modal-content { background: var(--bg); padding: 30px; border-radius: 25px; border: 1px solid var(--accent); width: 90%; max-width: 350px; text-align: center; }
        .flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; }
        .particle { position: absolute; border-radius: 50%; pointer-events: none; }

        @media (max-width: 768px) {
            .input-box { grid-template-columns: 1fr; }
            .full-width, .input-wrapper { grid-column: span 1; }
            .add-btn { grid-column: span 1; }
        }
    </style>
</head>
<body data-theme="dark">

    <div class="app-container">
        <header>
            <h1 style="color:var(--accent); margin:0;">Task.Manager Pro</h1>
            <button class="mode-toggle" onclick="toggleTheme()">🌓 Theme</button>
        </header>

        <div class="input-box">
            <div class="input-wrapper full-width">
                <label>Add Your Task here</label>
                <input type="text" id="taskName" placeholder="Enter task...">
            </div>
            <div class="input-wrapper">
                <label>Priority</label>
                <select id="taskPriority">
                    <option value="high">🔥Urgent</option>
                    <option value="med">⚡Medium</option>
                    <option value="low">🌱Low</option>
                </select>
            </div>
            <div class="input-wrapper">
                <label>Category</label>
                <select id="taskCat">
                    <option value="College">🎓College</option>
                    <option value="Work">💻Work</option>
                    <option value="Personal">🏠Personal</option>
                </select>
            </div>
            <div class="input-wrapper">
                <label>⏳Days</label>
                <input type="number" id="taskDays" placeholder="0">
            </div>
            <button class="add-btn full-width" onclick="addTask()">Add</button>
        </div>

        <div class="task-grid" id="taskGrid"></div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--accent)">Edit Your task</h2>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <input type="text" id="editName">
                <input type="number" id="editDays">
                <button class="add-btn" onclick="saveEdit()">Update</button>
                <button class="edit-btn" style="border:none" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentEditId = null;

        function toggleTheme() {
            document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
        }

        function renderTasks() {
            const grid = document.getElementById('taskGrid');
            grid.innerHTML = '';
            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = 'task-card';
                card.setAttribute('data-tilt', '');
                card.innerHTML = `
                    <div class="flash"></div>
                    <div class="priority-badge p-${task.priority}">${task.priority}</div>
                    <span class="category-tag">#${task.category}</span>
                    <h3>${task.name}</h3>
                    <p style="font-size:0.8rem; color:var(--subtext)">Delivery: ${task.days} Days</p>
                    <div class="actions">
                        <button class="card-btn edit-btn" onclick="openEdit(${task.id})">Edit</button>
                        <button class="card-btn done-btn" onclick="supernovaFinish(this, ${task.id})">Finish</button>
                    </div>
                `;
                grid.appendChild(card);
            });
            localStorage.setItem('tasks', JSON.stringify(tasks));
            if(window.innerWidth > 768) VanillaTilt.init(document.querySelectorAll(".task-card"), { max: 10, speed: 400 });
        }

        function addTask() {
            const name = document.getElementById('taskName').value;
            const days = document.getElementById('taskDays').value;
            if(!name || !days) return;
            const newTask = {
                id: Date.now(),
                name,
                priority: document.getElementById('taskPriority').value,
                category: document.getElementById('taskCat').value,
                days
            };
            tasks.push(newTask);
            renderTasks();
            document.getElementById('taskName').value = '';
            document.getElementById('taskDays').value = '';
        }

        function openEdit(id) {
            currentEditId = id;
            const task = tasks.find(t => t.id === id);
            document.getElementById('editName').value = task.name;
            document.getElementById('editDays').value = task.days;
            document.getElementById('editModal').style.display = 'flex';
        }

        function saveEdit() {
            const task = tasks.find(t => t.id === currentEditId);
            task.name = document.getElementById('editName').value;
            task.days = document.getElementById('editDays').value;
            closeModal();
            renderTasks();
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }

        function supernovaFinish(btn, id) {
            const card = btn.closest('.task-card');
            const flash = card.querySelector('.flash');
            const rect = card.getBoundingClientRect();
            const accent = getComputedStyle(document.body).getPropertyValue('--accent');
            
            gsap.timeline()
                .to(card, { scale: 0.85, duration: 0.1 })
                .to(flash, { opacity: 1, duration: 0.05 })
                .to(card, { scale: 1.8, opacity: 0, filter: "blur(20px)", duration: 0.4, 
                    onStart: () => explode(rect.left + rect.width/2, rect.top + rect.height/2, accent),
                    onComplete: () => {
                        tasks = tasks.filter(t => t.id !== id);
                        renderTasks();
                    }
                });
        }

        function explode(x, y, color) {
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                document.body.appendChild(p);
                gsap.set(p, { width: 4, height: 4, x, y, backgroundColor: color });
                const angle = Math.random() * Math.PI * 2;
                const v = 200 + Math.random() * 300;
                gsap.to(p, { x: "+=" + Math.cos(angle)*v, y: "+=" + Math.sin(angle)*v, opacity: 0, duration: 1, onComplete: () => p.remove() });
            }
        }

        renderTasks(); // Initial Load
    </script>
</body>
</html>
